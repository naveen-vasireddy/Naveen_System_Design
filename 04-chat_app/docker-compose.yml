version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      # Automatically initialize the database with your schema on first run
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  gateway:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx ts-node src/gateway.ts"
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=8080
    depends_on:
      - redis

  worker:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx ts-node src/worker.ts"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://user:pass@postgres:5432/chat
    depends_on:
      - postgres
      - redis